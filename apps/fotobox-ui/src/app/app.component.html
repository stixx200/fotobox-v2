@if (recovery.fatalError()) {
  <app-recovery-overlay />
} @else if (showRouter()) {
  @if (recovery.networkDegraded()) {
    <div class="network-banner" (click)="recovery.clearNetworkDegraded()">
      {{ 'RECOVERY.NETWORK_DEGRADED' | translate }}
    </div>
  }
  <router-outlet></router-outlet>
} @else {
  <app-splash-screen
    [errorMessage]="apiError()"
    (retry)="retryApi()"
  ></app-splash-screen>
}
