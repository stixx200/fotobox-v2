<div class="layout-container" (click)="takePicture()">
  <div class="live-view" [class.photo-mode]="collagePhoto()">
    <app-camera-live-view></app-camera-live-view>
  </div>

  <!-- Ready / progress message -->
  @if (!collagePhoto() && !capturing()) {
    <div class="message-stripe top-message">
      <p>{{ topMessage() }}</p>
    </div>
  }

  <!-- Intermediate collage preview: shows template with ? placeholders filling
       empty slots; updated after every captured photo. Hidden while the
       countdown / capture is in progress so the user sees the live camera. -->
  @if (!collagePhoto() && !capturing() && previewSrc(); as src) {
    <div class="collage-preview-fullscreen">
      <img [src]="src" alt="Collage Vorschau" />
    </div>
  }

  <!-- Finished collage view -->
  @if (collagePhoto(); as src) {
    <app-photo-view
      [src]="src"
      [showPrint]="showPrint()"
      (print)="print()"
      (back)="exitToHome()"
    ></app-photo-view>
  }

  <!-- Countdown -->
  <app-countdown (completed)="onCountdownComplete()"></app-countdown>

  <!-- Bottom message to exit (only if single layout is available) -->
  @if (
    !collagePhoto() &&
    !capturing() &&
    !isCollageComplete() &&
    !isOnlyLayoutActive
  ) {
    <div
      class="message-stripe bottom-message"
      (click)="exitToHome(); $event.stopPropagation()"
    >
      <p>Abbrechen</p>
    </div>
  }
</div>
