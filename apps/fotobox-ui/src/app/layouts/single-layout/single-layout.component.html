<div class="layout-container" (click)="takePicture()">
  @if (isOnlyLayoutActive) {
    <app-settings-escape-zone></app-settings-escape-zone>
    <button
      class="gallery-btn"
      mat-mini-fab
      [attr.aria-label]="'GALLERY.OPEN' | translate"
      (click)="goToGallery(); $event.stopPropagation()"
    >
      <mat-icon>photo_library</mat-icon>
    </button>
  }

  <div class="live-view" [class.photo-mode]="photo()">
    <app-camera-live-view></app-camera-live-view>
  </div>

  <!-- Ready message when no photo and no countdown -->
  @if (!photo() && !capturing()) {
    <div class="message-stripe top-message">
      <p>{{ 'SINGLE.PROMPT' | translate }}</p>
    </div>
  }

  <!-- Photo view -->
  @if (photo(); as src) {
    <app-photo-view
      [src]="src"
      [showPrint]="showPrint()"
      [showShare]="showShare()"
      (print)="print()"
      (share)="share()"
      (back)="onPhotoDismissed()"
    ></app-photo-view>
    @if (activeShareLink(); as link) {
      <app-share-qr-overlay
        [shareUrl]="link.url"
        [expiresAt]="link.expiresAt"
        (closed)="closeShare()"
      ></app-share-qr-overlay>
    }
  }

  <!-- Countdown -->
  <app-countdown (completed)="onCountdownComplete()"></app-countdown>

  <!-- Flash overlay after shutter fires -->
  @if (flashing()) {
    <div class="capture-flash"></div>
  }

  <!-- Bottom message to exit (only if collage is available) -->
  @if (!photo() && !capturing() && !isOnlyLayoutActive) {
    <div
      class="message-stripe bottom-message"
      (click)="exitToHome(); $event.stopPropagation()"
    >
      <p>{{ 'SINGLE.CANCEL' | translate }}</p>
    </div>
  }
</div>
